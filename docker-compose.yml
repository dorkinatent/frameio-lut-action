services:
  lut-action:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lut-action
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_PRETTY=false
    volumes:
      - lut-data:/tmp/archon-lut

volumes:
  lut-data:
